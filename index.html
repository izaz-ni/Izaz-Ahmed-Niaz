<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Professional Website</title>
    <link rel="stylesheet" href="styles.css">
    <script src="animations.js"></script>
</head>
<body>
    <header class="hero">
        <h1>Welcome to My Professional Portfolio</h1>
        <p>Your journey to excellence starts here.</p>
        <a href="#about" class="cta-button">Learn More</a>
    </header>
    
    <section id="about" class="section">
        <h2>About Me</h2>
        <p>Professional background and skills...</p>
    </section>
    
    <section id="skills" class="section">
        <h2>Skills</h2>
        <div class="skills-list">
            <div class="skill">Skill 1</div>
            <div class="skill">Skill 2</div>
        </div>
    </section>
    
    <section id="projects" class="section">
        <h2>Projects</h2>
        <div class="project-card">Project 1 Details</div>
    </section>
    
    <section id="books" class="section">
        <h2>Books</h2>
        <div class="book-card">Book 1 Details</div>
    </section>
    
    <section id="goals" class="section">
        <h2>Goals</h2>
        <p>My goals and aspirations...</p>
    </section>
    
    <section id="contact" class="section">
        <h2>Contact Me</h2>
        <form>
            <input type="text" placeholder="Your Name" required>
            <input type="email" placeholder="Your Email" required>
            <textarea placeholder="Your Message" required></textarea>
            <button type="submit" class="cta-button">Send Message</button>
        </form>
    </section>
    
    <footer>
        <p>&copy; 2026 My Professional Portfolio</p>
    </footer>
</body>
</html>
